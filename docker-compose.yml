version: "3.8"

services:
  # PostgreSQL Database
  postgres_db:
    image: postgres:15-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      # No DB_USER needed - defaults to 'postgres'
      # No DB_NAME needed - defaults to same as user
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Remove this in production if you want
    networks:
      - app_network

  # Node.js Backend API
  node_backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: app_node_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres_db
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # No DB_USER - default 'postgres'
      # No DB_NAME - default 'postgres'
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/public:/app/public # Public folder volume
    depends_on:
      - postgres_db
    networks:
      - app_network

  # React Frontend
  react_frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: app_react_frontend
    restart: unless-stopped
    networks:
      - app_network

  # Nginx Reverse Proxy
  nginx_proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: app_nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - react_frontend
      - node_backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
